name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/VidroApi.UnitTests --no-build --configuration Release --logger "console;verbosity=normal"

      - name: Run integration tests
        run: dotnet test tests/VidroApi.IntegrationTests --no-build --configuration Release --logger "console;verbosity=normal"
